services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # ${POSTGRES_PORT:-5433} on host → 5432 in container. Avoids conflict with
      # local postgres or any other service using 5432 on the host.
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Inside Docker, the server reaches Postgres by service name and container port.
      # .env keeps localhost:${POSTGRES_PORT:-5433} for host-side `dotnet run`.
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      # MinIO defaults for Docker — only active when FileStorage__Provider=S3.
      # Override via .env for local `dotnet run` (endpoint=http://localhost:9000).
      FileStorage__LocalPath: /data/hydraforge/attachments
      FileStorage__S3__Endpoint: http://minio:9000
      FileStorage__S3__AccessKey: ${MINIO_ROOT_USER:-minioadmin}
      FileStorage__S3__SecretKey: ${MINIO_ROOT_PASSWORD:-minioadmin}
      FileStorage__S3__BucketName: ${MINIO_BUCKET:-hydraforge-attachments}
      FileStorage__S3__Region: ${MINIO_REGION:-us-east-1}
      FileStorage__S3__ForcePathStyle: "true"
    ports:
      # 5000 on host → 8080 in container. Host 8080 is taken by Odysseus SearXNG.
      - "5000:8080"
    volumes:
      - hydraforge-attachments:/data/hydraforge/attachments
    extra_hosts:
      # Allows the container to reach services on the Docker host, including
      # Odysseus's SearXNG at http://host.docker.internal:8080.
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: src/web-ui
      dockerfile: Dockerfile
    depends_on:
      server:
        condition: service_started
    environment:
      NUXT_API_BASE_URL: http://server:8080
      NUXT_PUBLIC_AUTH_COOKIE_SECURE: "false"
    ports:
      - "3000:3000"

  searxng:
    # Only needed if Odysseus (or another SearXNG instance) is NOT running.
    # Default: reuse Odysseus's SearXNG at http://host.docker.internal:8080.
    # To use this instead: docker compose --profile search up
    # and set SearXng__BaseUrl=http://searxng:8080 in .env
    image: searxng/searxng:latest
    profiles: ["search"]
    ports:
      - "8082:8080"

volumes:
  postgres-data:
  minio-data:
  hydraforge-attachments:
