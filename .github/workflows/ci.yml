name: CI

on:
  push:
    branches: [main, "feat/**", "task/**"]
  pull_request:
    branches: [main, "feat/**"]

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
      - name: Restore
        run: dotnet restore HydraForge.slnx
      - name: Build
        run: dotnet build HydraForge.slnx --configuration Release --no-restore
      - name: Test
        run: dotnet test HydraForge.slnx --configuration Release --no-build

  web-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web-ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: src/web-ui/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build

  e2e:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [dotnet, web-ui]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: hydraforge
          POSTGRES_PASSWORD: hydraforge
          POSTGRES_DB: hydraforge
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: src/web-ui/pnpm-lock.yaml

      - name: Restore and build server
        run: |
          dotnet restore HydraForge.slnx
          dotnet build HydraForge.slnx --configuration Release --no-restore

      - name: Apply migrations
        env:
          ConnectionStrings__Default: "Host=localhost;Port=5433;Database=hydraforge;Username=hydraforge;Password=hydraforge"
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef database update \
            --project src/HydraForge.Infrastructure \
            --startup-project src/HydraForge.Server

      - name: Start API server
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://localhost:5000
          ConnectionStrings__Default: "Host=localhost;Port=5433;Database=hydraforge;Username=hydraforge;Password=hydraforge"
        run: |
          dotnet run --project src/HydraForge.Server --no-build --configuration Release &
          npx wait-on http://localhost:5000/openapi/v1.json --timeout 60000

      - name: Install web dependencies
        working-directory: src/web-ui
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: src/web-ui
        run: pnpm exec playwright install --with-deps chromium

      - name: Build and start web app
        working-directory: src/web-ui
        run: |
          pnpm build
          pnpm preview --port 3000 &
          npx wait-on http://localhost:3000/login --timeout 60000

      - name: Run Playwright tests
        working-directory: src/web-ui
        env:
          E2E_API_BASE_URL: http://localhost:5000
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/web-ui/playwright-report/
          retention-days: 7