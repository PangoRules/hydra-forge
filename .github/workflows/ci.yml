name: CI

on:
  push:
    branches: [main, "feat/**", "task/**"]
  pull_request:
    branches: [main, "feat/**"]

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
      - name: Restore
        run: dotnet restore HydraForge.slnx
      - name: Build
        run: dotnet build HydraForge.slnx --configuration Release --no-restore
      - name: Test
        run: dotnet test HydraForge.slnx --configuration Release --no-build

  web-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web-ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: src/web-ui/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build